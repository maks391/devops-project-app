services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      target: dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file: .env
    environment:
      - API_BASE_URL=http://localhost:${API_PORT:-8080}
    volumes:
      - ./frontend/src:/app/src:z
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Containerfile
      target: dev
    ports:
      - "${API_PORT:-8080}:8080"
    env_file: .env
    volumes:
      - ./api/src:/app/src:z
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - app-network
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Containerfile
      target: dev
    env_file: .env
    volumes:
      - ./worker/src:/app/src:z
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticketing_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing_user} -d ${POSTGRES_DB:-ticketing}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge
